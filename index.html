<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Studio Day - Kennenlernspiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --osd-orange: #FF6600;
            --osd-cyan: #00E5FF;
            --osd-dark: #000000;
            --osd-bg: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--osd-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            padding: 20px 0;
        }

        /* Hintergrund-Animation */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: var(--osd-orange);
            top: 10%;
            left: 10%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--osd-cyan);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 2rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            margin-bottom: 1rem;
        }

        .logo {
            max-width: 150px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(255, 102, 0, 0.5));
        }



        .question-box {
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            gap: 0.8rem;
        }

        #question-text {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--osd-cyan);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        #condition-text {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.4;
            opacity: 0.85;
            color: #e0e0e0;
            transition: all 0.5s ease;
            max-width: 85%;
            margin-top: 0.5rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            background: var(--osd-orange);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 15px rgba(255, 102, 0, 0.3);
            width: 100%;
            max-width: 250px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 25px rgba(255, 102, 0, 0.5);
            background: #ff751a;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.5;
        }

        .btn-skip {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            padding: 0.5rem 1.2rem;
            box-shadow: none;
        }

        .btn-skip:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        #skip-hint {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 0.3rem;
        }

        /* SmartTap Branding */
        .branding {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            z-index: 10;
        }

        .branding-text {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            color: white;
            font-weight: 700;
        }

        .smarttap-link {
            display: inline-block;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 18px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .smarttap-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 1);
            border-color: white;
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }

        .smarttap-logo {
            max-width: 110px;
            height: auto;
            display: block;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }

        /* Animationen */
        .fade-out { opacity: 0; transform: translateY(-20px) scale(0.9); }
        .fade-in { opacity: 1; transform: translateY(0) scale(1); }

        @media (max-width: 600px) {
            .container { padding: 1.5rem 1rem; }
            #question-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <img src="logo.png" alt="Open Studio Day Logo" class="logo">
        


        <div class="question-box">
            <p id="question-text">Bereit für den Open Studio Day?</p>
            <p id="condition-text"></p>
        </div>

        <div class="button-group">
            <button id="next-btn" class="btn">Nächste Frage</button>
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <button id="skip-btn" class="btn btn-skip">Aufgabe überspringen</button>
                <p id="skip-hint">Nur 1x hintereinander möglich</p>
            </div>
        </div>
    </div>

    <div class="branding">
        <span class="branding-text">unterstützt von</span>
        <a href="https://smarttap-offical.de/" target="_blank" class="smarttap-link">
            <img src="smarttap_logo.png" alt="SmartTap Logo" class="smarttap-logo">
        </a>
    </div>

    <script>
        let questions = [];
        let currentIndex = -1;
        let lastActionWasSkip = false;
        
        const questionText = document.getElementById('question-text');
        const conditionText = document.getElementById('condition-text');
        const nextBtn = document.getElementById('next-btn');
        const skipBtn = document.getElementById('skip-btn');

        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                questions = await response.json();
                questions.sort(() => Math.random() - 0.5);
            } catch (error) {
                questionText.innerText = "Fehler beim Laden der Fragen.";
            }
        }

        function parseQuestion(text) {
            const regex = /\(([^)]+)\)/;
            const match = text.match(regex);
            if (match) {
                const main = text.replace(match[0], '').trim();
                return { main, condition: match[0] };
            }
            return { main: text, condition: '' };
        }

        function updateDisplay(isSkip = false) {
            if (questions.length === 0) return;

            questionText.classList.add('fade-out');
            conditionText.classList.add('fade-out');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % questions.length;
                const parsed = parseQuestion(questions[currentIndex]);
                
                questionText.innerText = parsed.main;
                conditionText.innerText = parsed.condition;
                
                questionText.classList.remove('fade-out');
                conditionText.classList.remove('fade-out');
                questionText.classList.add('fade-in');
                conditionText.classList.add('fade-in');
                
                const colors = ['#00E5FF', '#FF6600', '#FFD600', '#FF00E5'];
                const currentColor = colors[currentIndex % colors.length];
                questionText.style.color = currentColor;
                questionText.style.textShadow = `0 0 15px ${currentColor}4d`;
                
                // Logik für Skip-Button
                lastActionWasSkip = isSkip;
                skipBtn.disabled = lastActionWasSkip;
                
            }, 300);
        }

        nextBtn.addEventListener('click', () => updateDisplay(false));
        skipBtn.addEventListener('click', () => updateDisplay(true));

        loadQuestions();
    </script>
</body>
</html>
